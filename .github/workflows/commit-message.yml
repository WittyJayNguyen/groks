name: Commit Message

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check Conventional Commit title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._-]+\))?!?: .{1,120}$'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must follow Conventional Commits."
            echo "Examples:"
            echo "  feat(pool): add pool create modal"
            echo "  fix(auth): clear invalid token"
            echo "  docs(frontend): add module guide"
            exit 1
          fi


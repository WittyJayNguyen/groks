name: Commit Message

on:
  pull_request:
    branches:
      - prod
      - staging
      - dev

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check Conventional Commit title with issue id
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|refactor|docs|chore|style|perf|vendor|test|build|ci|revert)(\([a-z0-9._-]+\))?!?: .{1,80} #[A-Za-z0-9._-]+$'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must follow Conventional Commits and include an issue id."
            echo "Examples:"
            echo "  feat(pool): thêm modal tạo credential #123"
            echo "  fix(auth): sửa lỗi token hết hạn #456"
            echo "  docs(frontend): cập nhật hướng dẫn module #GROKS-12"
            exit 1
          fi

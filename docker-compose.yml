services:
  backend:
    build: ./backend
    environment:
      GROKS_SECRET_KEY: ${GROKS_SECRET_KEY:-change-me-local}
      GROKS_MOCK_PROVIDER: ${GROKS_MOCK_PROVIDER:-1}
      GROKS_CORS_ORIGINS: ${GROKS_CORS_ORIGINS:-*}
    volumes:
      - ./backend/data:/app/data
    ports:
      - "${GROKS_BACKEND_PORT:-18081}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:18081}
    ports:
      - "${GROKS_FRONTEND_PORT:-15181}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
